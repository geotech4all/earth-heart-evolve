<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geotech4All - Everything Geoscience</title>
    <meta name="description" content="Geotech4All is a geo-data acquisition and analysis firm, leveraging cutting-edge technology and expert knowledge to deliver high-quality geoscience solutions." />
    <meta name="author" content="Geotech4All" />

    <meta property="og:title" content="Geotech4All - Everything Geoscience" />
    <meta property="og:description" content="Geotech4All is a geo-data acquisition and analysis firm, leveraging cutting-edge technology and expert knowledge to deliver high-quality geoscience solutions." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@geotech4all" />

    <style>
      /* Loading screen */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.3s;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-logo {
        width: 64px;
        height: 64px;
        background: #E10600;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse-loader 1.5s ease-in-out infinite;
      }
      .loader-logo span {
        color: #fff;
        font-size: 32px;
        font-weight: 700;
        font-family: 'Montserrat', sans-serif;
      }
      @keyframes pulse-loader {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
    </style>
  </head>

  <body>
    <div id="app-loader">
      <div class="loader-logo"><span>G</span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
